joy:
  ros__parameters:
    dev: /dev/input/js0
    deadzone: 0.01
    autorepeat_rate: 20.0
    coalesce_interval: 0.01

joy_teleop:
  ros__parameters:
    default:
      type: topic
      interface_type: ackermann_msgs/msg/AckermannDriveStamped
      topic_name: teleop
      axis_mappings:
        drive-speed:
          axis: 1
          scale: 0.0
          offset: 0.0
        drive-steering_angle:
          axis: 2
          scale: 0.0
          offset: 0.0

    human_control:
      type: topic
      interface_type: ackermann_msgs/msg/AckermannDriveStamped
      topic_name: teleop
      deadman_buttons: [6]
      axis_mappings:
        drive-speed:
          axis: 1
          scale: 2.0
          offset: 0.0
        drive-steering_angle:
          axis: 2
          scale: 0.25
          offset: 0.0

    autonomous_control:
      type: topic
      interface_type: std_msgs/msg/Int8
      topic_name: enable_autonomous_control
      deadman_buttons: [5]
      message_value:
        data:
          value: 0
